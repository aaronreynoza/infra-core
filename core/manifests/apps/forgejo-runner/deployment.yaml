apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: register
          image: harbor.aaron.reynoza.org/platform/forgejo-runner@sha256:c7239a389b7ad9286bc4d8253b44fb900b538e13c36dc95e45f6d66d980ef9b3
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --instance http://forgejo-http.forgejo.svc.cluster.local:3000 \
                  --token "$(cat /secrets/token)" \
                  --labels "k8s-runner:host" \
                  --name k8s-runner \
                  --no-interactive
              fi
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-secret
              mountPath: /secrets
              readOnly: true
      containers:
        - name: runner
          image: harbor.aaron.reynoza.org/platform/forgejo-runner@sha256:c7239a389b7ad9286bc4d8253b44fb900b538e13c36dc95e45f6d66d980ef9b3
          command: ["forgejo-runner", "daemon"]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
        - name: dind
          image: docker:27.5.1-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=tcp://0.0.0.0:2375
            - --tls=false
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: runner-secret
          secret:
            secretName: forgejo-runner-secret
        - name: docker-data
          persistentVolumeClaim:
            claimName: forgejo-runner-docker-data
        - name: workspace
          emptyDir:
            sizeLimit: 10Gi
