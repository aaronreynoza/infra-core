apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plane
  namespace: management
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: cilium-system
  hostnames:
    - "plane.aaron.reynoza.org"
  rules:
    # API and auth routes -> backend API service
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: plane-app-api
          port: 8000
    # Live collaboration service
    - matches:
        - path:
            type: PathPrefix
            value: /live/
      backendRefs:
        - name: plane-app-live
          port: 3000
    # Public project spaces
    - matches:
        - path:
            type: PathPrefix
            value: /spaces
      backendRefs:
        - name: plane-app-space
          port: 3000
    # Admin panel (god-mode)
    - matches:
        - path:
            type: PathPrefix
            value: /god-mode
      backendRefs:
        - name: plane-app-admin
          port: 3000
    # File uploads from MinIO
    - matches:
        - path:
            type: PathPrefix
            value: /uploads
      backendRefs:
        - name: plane-app-minio
          port: 9000
    # Default: web frontend (catch-all)
    - backendRefs:
        - name: plane-app-web
          port: 3000
