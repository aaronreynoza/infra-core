apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zitadel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.zitadel.com
    chart: zitadel
    targetRevision: 9.26.0
    helm:
      valueFiles: []
      values: |
        zitadel:
          masterkeySecretName: zitadel-credentials
          configmapConfig:
            ExternalSecure: false
            ExternalDomain: "REDACTED_LB_IP"
            ExternalPort: 8080
            TLS:
              Enabled: false
            Database:
              Postgres:
                Host: cnpg-cluster-zitadel-rw
                Port: 5432
                Database: zitadel
                User:
                  Username: zitadel
                  SSL:
                    Mode: disable
                Admin:
                  Username: postgres
                  SSL:
                    Mode: disable
            DefaultInstance:
              Features:
                LoginV2:
                  Required: false
        login:
          enabled: false
        env:
          - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: cnpg-cluster-zitadel-app
                key: password
          - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: cnpg-cluster-zitadel-superuser
                key: password
        service:
          type: LoadBalancer
          port: 8080
          protocol: http2
          annotations: {}
        ingress:
          enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        initJob:
          enabled: true
          backoffLimit: 5
          activeDeadlineSeconds: 300
        replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: zitadel
  syncPolicy:
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
