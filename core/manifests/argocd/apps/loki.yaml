apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.29.0
    helm:
      values: |
        # Single-binary mode for homelab simplicity
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          persistence:
            enabled: true
            storageClass: longhorn
            size: 50Gi

        # Disable distributed components (using single-binary)
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        # Filesystem storage only (no S3/GCS)
        loki:
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: filesystem
          commonConfig:
            replication_factor: 1
          auth_enabled: false
          limits_config:
            retention_period: 30d
            allow_structured_metadata: true
            volume_enabled: true

        # Disable gateway (not needed for single-binary)
        gateway:
          enabled: false

        # Disable minio subchart
        minio:
          enabled: false

        # Disable chunksCache, resultsCache (keep it simple)
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        # Monitoring - disable self-monitoring to avoid circular deps
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

        # Disable test pod
        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
