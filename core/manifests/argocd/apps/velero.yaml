apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 11.4.0
    helm:
      valueFiles: []
      values: |
        # AWS credentials managed via SOPS — see docs/configuration.md

        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.14.0
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins

        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: "CHANGEME-velero-backups"
              default: true
              accessMode: ReadWrite
              config:
                region: us-east-1
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: us-east-1

        credentials:
          useSecret: true
          existingSecret: velero-aws-credentials

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        deployNodeAgent: true
        nodeAgent:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        schedules:
          daily-backup:
            disabled: false
            schedule: "0 2 * * *"
            template:
              ttl: "720h"
              storageLocation: default
              includedNamespaces:
                - "*"
              excludedNamespaces:
                - kube-system
                - velero
              defaultVolumesToFsBackup: true

        snapshotsEnabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
