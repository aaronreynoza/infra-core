apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: code.forgejo.org
    chart: forgejo-helm/forgejo
    targetRevision: 16.2.1
    helm:
      valueFiles: []
      values: |
        service:
          http:
            type: LoadBalancer
          ssh:
            enabled: false

        ingress:
          enabled: false

        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi

        gitea:
          admin:
            existingSecret: forgejo-credentials
            email: admin@localhost

          additionalConfigFromEnvs:
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: cnpg-cluster-forgejo-app
                  key: password

          config:
            server:
              DOMAIN: localhost
              ROOT_URL: http://localhost:3000
              SSH_DOMAIN: ""
              DISABLE_SSH: true

            database:
              DB_TYPE: postgres
              HOST: cnpg-cluster-forgejo-rw:5432
              NAME: forgejo
              USER: forgejo
              SSL_MODE: disable

            service:
              DISABLE_REGISTRATION: true

            oauth2:
              ENABLED: false

            actions:
              ENABLED: true

            cache:
              ADAPTER: memory
            session:
              PROVIDER: memory
            queue:
              TYPE: level

        postgresql:
          enabled: false

        postgresql-ha:
          enabled: false

        redis-cluster:
          enabled: false

        valkey-cluster:
          enabled: false

        test:
          enabled: false

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
