apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.108.0
    helm:
      values: |
        # Deployment mode (not daemonset) for homelab
        mode: deployment
        replicaCount: 1

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Ports exposed by the collector
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP

        # Service (ClusterIP - internal only)
        service:
          type: ClusterIP

        # Collector configuration
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"

          processors:
            batch:
              timeout: 10s
              send_batch_size: 1024
            memory_limiter:
              check_interval: 5s
              limit_mib: 400
              spike_limit_mib: 100

          exporters:
            # Metrics -> Mimir (via Prometheus remote-write)
            prometheusremotewrite:
              endpoint: http://mimir.monitoring.svc.cluster.local:9009/api/v1/push
              tls:
                insecure: true
            # Traces -> Tempo (via OTLP gRPC)
            otlp/tempo:
              endpoint: http://tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            # Logs -> Loki (via OTLP HTTP)
            otlphttp/loki:
              endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
              tls:
                insecure: true

          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheusremotewrite]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlphttp/loki]
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
