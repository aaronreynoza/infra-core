apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-credentials
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secrets
  target:
    name: harbor-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: app-credentials
        property: harbor_admin_password
