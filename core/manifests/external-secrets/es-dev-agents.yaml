# Dev-agent secrets — synced from secrets namespace to dev-agents
# These support per-ticket dev environments managed by Lab Director
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dev-agent-credentials
  namespace: dev-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secrets
  target:
    name: dev-agent-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev-agent-credentials
---
