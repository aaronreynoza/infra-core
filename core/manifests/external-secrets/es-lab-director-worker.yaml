# Worker agent secrets — synced from secrets namespace to lab-director
# These support the Temporal worker that executes pipeline stages
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dev-agent-credentials
  namespace: lab-director
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secrets
  target:
    name: dev-agent-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev-agent-credentials
---
