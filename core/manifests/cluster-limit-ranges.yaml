# Default LimitRanges for namespaces (HOMELAB-284)
# Provides fallback resource requests/limits for containers that don't specify them.
# This ensures the scheduler has data for placement decisions.
#
# Namespaces targeted: those with the most containers missing resource requests.
# Namespaces with their own chart-level resources (argocd, langfuse, ollama) are
# handled via Helm values instead.
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resources
  namespace: harbor
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 512Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resources
  namespace: monitoring
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 32Mi
      default:
        cpu: 500m
        memory: 512Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resources
  namespace: management
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 1000m
        memory: 1Gi
---
