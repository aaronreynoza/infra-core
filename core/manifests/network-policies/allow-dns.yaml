# Allow all pods to reach kube-dns for DNS resolution.
# This must be deployed BEFORE baseline-deny-all.yaml to prevent DNS breakage.
#
# See: docs/decisions/008-cilium-network-policies.md
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns
spec:
  description: "Allow DNS resolution from all pods to kube-dns"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
