# Allow Prometheus (in monitoring namespace) to scrape metrics from all pods.
# This must be deployed BEFORE baseline-deny-all.yaml to prevent scrape failures.
#
# See: docs/decisions/008-cilium-network-policies.md
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-monitoring-scrape
spec:
  description: "Allow Prometheus scraping from monitoring namespace"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            # Common metrics ports
            - port: "9090"
              protocol: TCP
            - port: "9091"
              protocol: TCP
            - port: "9093"
              protocol: TCP
            - port: "9094"
              protocol: TCP
            - port: "9100"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "8443"
              protocol: TCP
            - port: "3100"
              protocol: TCP
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
