# Longhorn RecurringJobs — automated snapshots for volume data protection
# Applied cluster-wide via the default StorageClass label
# Docs: https://longhorn.io/docs/1.7.2/snapshots-and-backups/scheduling-backups-and-snapshots/
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  cron: "0 3 * * *"      # 3 AM UTC daily (1 hour after Velero)
  task: snapshot
  retain: 7               # Keep 7 daily snapshots
  concurrency: 2
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-snapshot
  namespace: longhorn-system
spec:
  cron: "0 4 * * 0"      # 4 AM UTC every Sunday
  task: snapshot
  retain: 4               # Keep 4 weekly snapshots
  concurrency: 2
  groups:
    - default
