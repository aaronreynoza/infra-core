---
- name: Apply Argo CD root app and wait for Cilium apps
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"

  vars:
    argocd_namespace: "argocd"
    # robust path: go two levels up from playbook_dir, then apps/cluster/root.yaml
    root_app_file: "{{ (playbook_dir | dirname | dirname) ~ '/apps/cluster/root.yaml' }}"
    child_apps: [cilium-namespace, cilium, longhorn-namespace, longhorn]

  tasks:
    - name: Apply root Application (app-of-apps)
      kubernetes.core.k8s:
        state: present
        namespace: "{{ argocd_namespace }}"
        kubeconfig: "{{ kubeconfig_path | expanduser }}"
        # Use definition + lookup('file', ...) to avoid loader path issues
        definition: "{{ lookup('file', root_app_file) }}"

    - name: Wait until child apps are Synced & Healthy (ordered)
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ argocd_namespace }}"
        name: "{{ item }}"
        kubeconfig: "{{ kubeconfig_path | expanduser }}"
      register: st
      until:
        st.resources
        and st.resources[0].status.sync.status == "Synced"
        and st.resources[0].status.health.status == "Healthy"
      retries: 60
      delay: 10
      loop: "{{ child_apps }}"
