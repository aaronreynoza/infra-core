# LiteLLM Proxy — Generic Configuration
# Central API gateway for LLM routing (Ollama local models)
# Chart: oci://docker.litellm.ai/berriai/litellm-helm
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Environment-specific overrides (master key) live in prod/values/litellm/

replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm
  pullPolicy: IfNotPresent
  tag: "v1.82.3-stable"

# Service — ClusterIP, other apps reach it via litellm.ai.svc.cluster.local:4000
service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false

# Disable standalone PostgreSQL — stateless proxy mode
db:
  deployStandalone: false
  useExisting: false

# Disable migration job (no database)
migrationJob:
  enabled: false

# Resources
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Model routing config — API keys injected via env vars in prod override
proxy_config:
  model_list:
    # --- Lab Director pipeline models (effort matrix) ---
    - model_name: ollama-fast
      litellm_params:
        model: ollama/qwen3:8b
        api_base: http://ollama.ai.svc.cluster.local:11434
        stream: false
        request_timeout: 120
    - model_name: ollama-mid
      litellm_params:
        model: ollama/qwen3:32b
        api_base: http://ollama.ai.svc.cluster.local:11434
        stream: false
        request_timeout: 300
    # --- Legacy models (Open WebUI, general use) ---
    - model_name: fast
      litellm_params:
        model: ollama/llama3.2:1b-instruct-q4_0
        api_base: http://ollama.ai.svc.cluster.local:11434
    - model_name: code
      litellm_params:
        model: ollama/qwen2.5-coder:7b
        api_base: http://ollama.ai.svc.cluster.local:11434
  litellm_settings:
    callbacks: ["langfuse"]
  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
