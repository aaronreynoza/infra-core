apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandbox.fullname" . }}
  labels:
    {{- include "sandbox.labels" . | nindent 4 }}
    reynoza.co/profile-id: {{ .Values.sandbox.profileId | quote }}
    reynoza.co/sandbox: {{ .Values.sandbox.name | quote }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "sandbox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sandbox.selectorLabels" . | nindent 8 }}
        reynoza.co/profile-id: {{ .Values.sandbox.profileId | quote }}
    spec:
      serviceAccountName: {{ include "sandbox.fullname" . }}
      terminationGracePeriodSeconds: 60
      containers:
        # --- Main sandbox container ---
        - name: sandbox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PROFILE_ID
              value: {{ .Values.env.PROFILE_ID | default .Values.sandbox.profileId | quote }}
            - name: LAB_DIRECTOR_API_URL
              value: {{ .Values.env.LAB_DIRECTOR_API_URL | quote }}
            - name: TEMPORAL_HOST_PORT
              value: {{ .Values.env.TEMPORAL_HOST_PORT | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.env.TEMPORAL_NAMESPACE | quote }}
            - name: DOCKER_HOST
              value: {{ .Values.env.DOCKER_HOST | quote }}
            - name: DOCKER_TLS_VERIFY
              value: {{ .Values.env.DOCKER_TLS_VERIFY | quote }}
            - name: DOCKER_CERT_PATH
              value: {{ .Values.env.DOCKER_CERT_PATH | quote }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.credentials }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Workspace PVC
            - name: workspace
              mountPath: /home/claude-agent/workspace
            # DinD client certs (shared with sidecar)
            - name: dind-certs
              mountPath: /certs/client
              subPath: client
              readOnly: true
            # SSH keys
            - name: ssh-key
              mountPath: /home/claude-agent/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: ssh-key
              mountPath: /home/claude-agent/.ssh/id_ed25519.pub
              subPath: id_ed25519.pub
              readOnly: true
            # Git credentials
            - name: credentials
              mountPath: /home/claude-agent/.git-credentials
              subPath: git-credentials
              readOnly: true
            # Git config
            - name: gitconfig
              mountPath: /home/claude-agent/.gitconfig
              subPath: .gitconfig
              readOnly: true
            # Claude OAuth tokens
            - name: claude-oauth
              mountPath: /home/claude-agent/.claude/.credentials.json
              subPath: credentials.json
              readOnly: true
            # Claude settings
            - name: claude-settings
              mountPath: /home/claude-agent/.claude/settings-mount
              readOnly: true
            # MCP config
            - name: mcp-config
              mountPath: /home/claude-agent/.claude/mcp-config.json
              subPath: mcp-config.json
              readOnly: true

        # --- DinD sidecar (provides dockerd for k3s) ---
        - name: dind
          image: "{{ .Values.dind.image.repository }}:{{ .Values.dind.image.tag }}"
          imagePullPolicy: {{ .Values.dind.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            {{- toYaml .Values.dind.resources | nindent 12 }}
          volumeMounts:
            - name: dind-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-workspace" (include "sandbox.fullname" .)) }}
        - name: dind-certs
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
        - name: ssh-key
          secret:
            secretName: {{ .Values.secrets.sshKey }}
            defaultMode: 0600
        - name: credentials
          secret:
            secretName: {{ .Values.secrets.credentials }}
        - name: gitconfig
          configMap:
            name: {{ .Values.configmaps.gitConfig }}
        - name: claude-oauth
          secret:
            secretName: {{ .Values.secrets.claudeOauth }}
        - name: claude-settings
          configMap:
            name: {{ .Values.configmaps.claudeSettings }}
        - name: mcp-config
          configMap:
            name: {{ .Values.configmaps.mcpConfig }}
