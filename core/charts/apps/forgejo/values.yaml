# Forgejo Helm Values — Generic Configuration
# Self-hosted Git server (Gitea fork)
# Chart: oci://code.forgejo.org/forgejo-helm/forgejo
# Docs: https://forgejo.org/docs/latest/admin/installation-helm/
#
# Environment-specific overrides (DOMAIN, ROOT_URL, DB connection,
# admin secret, additionalConfigFromEnvs) live in prod/values/forgejo/

# Service - LoadBalancer via Cilium LB-IPAM
service:
  http:
    type: LoadBalancer
  ssh:
    enabled: false

# Ingress disabled - direct LB access
ingress:
  enabled: false

# Persistence using Longhorn
persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

# Forgejo application config
gitea:
  admin:
    email: admin@localhost

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  config:
    server:
      SSH_DOMAIN: ""
      DISABLE_SSH: true

    database:
      DB_TYPE: postgres
      SSL_MODE: disable

    service:
      DISABLE_REGISTRATION: true

    oauth2:
      ENABLED: true

    actions:
      ENABLED: true

    metrics:
      ENABLED: true

    # Webhook - allow delivery to private/internal IPs (for Atlantis, etc.)
    webhook:
      ALLOWED_HOST_LIST: private,loopback,external

    # Cache/session/queue - use built-in memory/leveldb (no external redis)
    cache:
      ADAPTER: memory
    session:
      PROVIDER: memory
    queue:
      TYPE: level

# Disable all subcharts - using CNPG for postgres, memory for cache
postgresql:
  enabled: false

postgresql-ha:
  enabled: false

redis-cluster:
  enabled: false

valkey-cluster:
  enabled: false

# Disable test pods
test:
  enabled: false

# Resource limits - appropriate for homelab
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
