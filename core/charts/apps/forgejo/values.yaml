# Forgejo Helm Values — Reference Configuration
# Self-hosted Git server (Gitea fork)
# Chart: oci://code.forgejo.org/forgejo-helm/forgejo
# Docs: https://forgejo.org/docs/latest/admin/installation-helm/
#
# Secrets managed via SOPS — see docs/configuration.md
# Required K8s secret: forgejo-credentials
#   Keys: admin-username, admin-password, postgresql-password
# Created by Terraform from environments/<env>/secrets/

# Service - LoadBalancer via Cilium LB-IPAM (gets IP from REDACTED_LB_IP-250)
service:
  http:
    type: LoadBalancer
  ssh:
    enabled: false

# Ingress disabled - direct LB access
ingress:
  enabled: false

# Persistence using Longhorn
persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

# Forgejo application config
gitea:
  admin:
    existingSecret: forgejo-credentials
    email: admin@localhost

  config:
    server:
      # Domain will be the LB IP assigned by Cilium LB-IPAM
      # Update after first deploy: kubectl get svc -n forgejo
      DOMAIN: localhost
      ROOT_URL: http://localhost:3000
      SSH_DOMAIN: ""
      DISABLE_SSH: true

    database:
      DB_TYPE: postgres

    service:
      DISABLE_REGISTRATION: true

    # Disable OAuth for now - will integrate with Zitadel later
    oauth2:
      ENABLED: false

    # Actions runner support
    actions:
      ENABLED: true

    # Cache/session/queue - use built-in leveldb (no external redis)
    cache:
      ADAPTER: memory
    session:
      PROVIDER: memory
    queue:
      TYPE: level

# PostgreSQL - internal subchart
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        existingSecret: forgejo-credentials
        secretKeys:
          userPasswordKey: postgresql-password
        database: forgejo
        username: forgejo
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# Disable redis-cluster - using built-in memory/leveldb
redis-cluster:
  enabled: false

# Disable test pods
test:
  enabled: false

# Resource limits - appropriate for homelab
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
