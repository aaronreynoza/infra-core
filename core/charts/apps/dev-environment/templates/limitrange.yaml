apiVersion: v1
kind: LimitRange
metadata:
  name: dev-env-limits
  labels:
    {{- include "dev-environment.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      max:
        cpu: "8"
        memory: 14Gi
      default:
        cpu: "6"
        memory: 12Gi
      defaultRequest:
        cpu: "2"
        memory: 8Gi
