apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-environment.fullname" . }}
  labels:
    {{- include "dev-environment.labels" . | nindent 4 }}
    reynoza.co/ticket-id: {{ .Values.ticket.id | quote }}
    reynoza.co/project: {{ .Values.ticket.project | quote }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dev-environment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dev-environment.selectorLabels" . | nindent 8 }}
        reynoza.co/ticket-id: {{ .Values.ticket.id | quote }}
        reynoza.co/project: {{ .Values.ticket.project | quote }}
    spec:
      serviceAccountName: dev-agent
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: ["sh", "-c", "rm -rf /workspace/lost+found"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TICKET_ID
              value: {{ .Values.ticket.id | quote }}
            - name: PROJECT
              value: {{ .Values.ticket.project | quote }}
            - name: REPO_URL
              value: {{ .Values.ticket.repoUrl | quote }}
            - name: BRANCH
              value: {{ .Values.ticket.branch | quote }}
            - name: MODE
              value: {{ .Values.mode | quote }}
            {{- if eq .Values.mode "headless" }}
            - name: PROMPT
              value: {{ .Values.prompt | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.configmaps.env }}
            - secretRef:
                name: {{ .Values.secrets.credentials }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Workspace PVC
            - name: workspace
              mountPath: /home/claude-agent/workspace
            # SSH keys
            - name: ssh-key
              mountPath: /home/claude-agent/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: ssh-key
              mountPath: /home/claude-agent/.ssh/id_ed25519.pub
              subPath: id_ed25519.pub
              readOnly: true
            # Kubeconfig
            - name: kubeconfig
              mountPath: /home/claude-agent/.kube/config
              subPath: config
              readOnly: true
            # ArgoCD config
            - name: argocd-config
              mountPath: /home/claude-agent/.config/argocd/config
              subPath: config
              readOnly: true
            # SOPS age key
            - name: sops-key
              mountPath: /home/claude-agent/.config/sops/age/keys.txt
              subPath: keys.txt
              readOnly: true
            # Git credentials
            - name: credentials
              mountPath: /home/claude-agent/.git-credentials
              subPath: git-credentials
              readOnly: true
            # Git config (mounted to init path; entrypoint copies to ~/.gitconfig)
            - name: gitconfig
              mountPath: /etc/gitconfig-init
              readOnly: true
            # Claude OAuth tokens
            - name: claude-oauth
              mountPath: /home/claude-agent/.claude/.credentials.json
              subPath: credentials.json
              readOnly: true
            # Claude settings
            - name: claude-settings
              mountPath: /home/claude-agent/.claude/settings-mount
              readOnly: true
            # MCP config
            - name: mcp-config
              mountPath: /home/claude-agent/.claude/mcp-config.json
              subPath: mcp-config.json
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "dev-environment.fullname" . }}-workspace
        - name: ssh-key
          secret:
            secretName: {{ .Values.secrets.sshKey }}
            defaultMode: 0600
        - name: kubeconfig
          secret:
            secretName: {{ .Values.secrets.kubeconfig }}
        - name: argocd-config
          secret:
            secretName: {{ .Values.secrets.argocdConfig }}
        - name: sops-key
          secret:
            secretName: {{ .Values.secrets.sopsKey }}
        - name: credentials
          secret:
            secretName: {{ .Values.secrets.credentials }}
        - name: gitconfig
          configMap:
            name: {{ .Values.configmaps.gitConfig }}
        - name: claude-oauth
          secret:
            secretName: {{ .Values.secrets.claudeOauth }}
        - name: claude-settings
          configMap:
            name: {{ .Values.configmaps.claudeSettings }}
        - name: mcp-config
          configMap:
            name: {{ .Values.configmaps.mcpConfig }}
