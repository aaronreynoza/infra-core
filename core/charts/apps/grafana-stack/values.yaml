# Grafana Stack Helm Values
# Monitoring and observability (Grafana + InfluxDB)

# Grafana configuration
grafana:
  # Admin credentials - use External Secrets
  adminUser: admin
  adminPassword: ""  # Set via External Secrets

  # Persistence
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi

  # Ingress - use Cloudflare Tunnel
  ingress:
    enabled: false

  # Data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: InfluxDB
          type: influxdb
          access: proxy
          url: http://influxdb:8086
          jsonData:
            version: Flux
            organization: homelab
            defaultBucket: metrics

  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# InfluxDB configuration
influxdb:
  # Persistence
  persistence:
    enabled: true
    storageClass: longhorn
    size: 50Gi

  # Initial setup
  adminUser:
    organization: homelab
    bucket: metrics
    user: admin
    password: ""  # Set via External Secrets

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
