# OpenClaw Helm Values — Generic Configuration
# Autonomous AI agent with Signal/WhatsApp messaging
# Chart: openclaw (https://serhanekicii.github.io/openclaw-helm/)
# Docs: https://github.com/serhanekicii/openclaw-helm
#
# Environment-specific overrides (LLM config, secrets, storageClass)
# live in prod/values/openclaw/

app-template:
  # Pin application version
  openclawVersion: "2026.3.13-1"
  chromiumVersion: "146.0.7680.80"

  # Merge mode preserves runtime state (Signal sessions, conversation history)
  configMode: merge

  defaultPodOptions:
    securityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch

  controllers:
    main:
      # OpenClaw is NOT horizontally scalable — single instance only
      replicas: 1
      strategy: Recreate

      initContainers:
        init-config:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "{{ .Values.openclawVersion }}"
          command:
            - sh
            - -c
            - |
              set -e
              CONFIG_DIR="/home/node/.openclaw"
              CONFIG_FILE="$CONFIG_DIR/openclaw.json"
              HELM_CONFIG="/config/openclaw.json"
              if [ "$CONFIG_MODE" = "overwrite" ] || [ ! -f "$CONFIG_FILE" ]; then
                echo "Writing config (mode=$CONFIG_MODE)"
                cp "$HELM_CONFIG" "$CONFIG_FILE"
              else
                echo "Merge mode: config exists, skipping overwrite"
              fi
          env:
            CONFIG_MODE: "{{ .Values.configMode | default \"merge\" }}"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        main:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "{{ .Values.openclawVersion }}"
            pullPolicy: IfNotPresent
          command:
            - node
            - dist/index.js
          args:
            - gateway
            - --bind
            - lan
            - --port
            - "18789"
          envFrom: []
          env: {}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false

        # chromium sidecar disabled — not needed for messaging agent
        # Re-enable when browser automation is required
        chromium:
          enabled: false

  # ConfigMap — gateway config and shell aliases
  configMaps:
    config:
      enabled: true
      data:
        bash_aliases: |
          alias openclaw='node /app/dist/index.js'
        openclaw.json: |
          {
            "gateway": {
              "port": 18789,
              "bind": "lan",
              "mode": "local",
              "trustedProxies": ["10.0.0.1"]
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },
            "agents": {
              "defaults": {
                "workspace": "/home/node/.openclaw/workspace",
                "userTimezone": "UTC",
                "timeoutSeconds": 600,
                "maxConcurrent": 1
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "identity": {
                    "name": "OpenClaw",
                    "emoji": "🦞"
                  }
                }
              ]
            },
            "session": {
              "scope": "per-sender",
              "store": "/home/node/.openclaw/sessions",
              "reset": {
                "mode": "idle",
                "idleMinutes": 60
              }
            },
            "logging": {
              "level": "info",
              "consoleLevel": "info",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "profile": "full",
              "web": {
                "search": { "enabled": false },
                "fetch": { "enabled": true }
              }
            }
          }

  # Service — ClusterIP, exposed via HTTPRoute
  service:
    main:
      controller: main
      ipFamilyPolicy: SingleStack
      ipFamilies:
        - IPv4
      ports:
        http:
          port: 18789

  # Ingress disabled — using Cilium Gateway HTTPRoute instead
  ingress:
    main:
      enabled: false

  # Persistence — PVC size here, storageClass is env-specific
  persistence:
    config:
      enabled: true
      type: configMap
      identifier: config
      advancedMounts:
        main:
          init-config:
            - path: /config
              readOnly: true

    bash-aliases:
      enabled: true
      type: configMap
      identifier: config
      advancedMounts:
        main:
          main:
            - path: /home/node/.bash_aliases
              subPath: bash_aliases
              readOnly: true

    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 20Gi
      advancedMounts:
        main:
          init-config:
            - path: /home/node/.openclaw
          main:
            - path: /home/node/.openclaw

    tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          init-config:
            - path: /tmp
          main:
            - path: /tmp
          chromium:
            - path: /tmp

  # Network policies disabled — using CiliumNetworkPolicy separately
  networkpolicies:
    main:
      enabled: false
