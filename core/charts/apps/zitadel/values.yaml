# Zitadel Helm Values — Generic Configuration
# Identity Provider and OAuth/OIDC server
# Chart: https://charts.zitadel.com (zitadel)
# Docs: https://zitadel.com/docs/self-hosting/deploy/kubernetes
#
# Environment-specific overrides (ExternalDomain, DB host, secrets)
# are in the prod repo: values/zitadel/values.yaml
#
# Internal-only deployment via Cilium LB-IPAM (no ingress, no TLS termination)

zitadel:
  configmapConfig:
    ExternalSecure: false
    TLS:
      Enabled: false
    Database:
      Postgres:
        Port: 5432
        User:
          SSL:
            Mode: disable
        Admin:
          SSL:
            Mode: disable
    DefaultInstance:
      Features:
        LoginV2:
          Required: false

login:
  enabled: false

# Service — LoadBalancer for Cilium LB-IPAM
service:
  type: LoadBalancer
  port: 8080
  protocol: http2
  annotations: {}

# Ingress disabled — direct LB access
ingress:
  enabled: false

# Zitadel container resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Init job — runs DB migrations and initial setup
initJob:
  enabled: true
  backoffLimit: 5
  activeDeadlineSeconds: 300

replicaCount: 1
