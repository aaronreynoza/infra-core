    repository: harbor.aaron.reynoza.org/lab-director/backend
    tag: "6192621"
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    OPERATOR_URL: ""  # Set in prod overrides

frontend:
  image:
    repository: harbor.aaron.reynoza.org/lab-director/frontend
    tag: "0.1.0"
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

database:
  secretName: cnpg-cluster-lab-director-app
  secretKey: uri

worker:
  enabled: false  # Enable in prod overrides
  image:
    repository: harbor.aaron.reynoza.org/lab-director/devenv-homelab
    tag: ""  # Set in prod overrides
  replicas: 1
  serviceAccountName: dev-agent
  temporal:
    hostPort: ""  # Set in prod overrides
    namespace: default
    callbackURL: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  workspace:
    storageSize: 15Gi
    storageClass: longhorn
  secrets:
    credentials: ""    # Set in prod overrides
    sshKey: ""
    kubeconfig: ""
    argocdConfig: ""
    claudeOauth: ""
  configmaps:
    gitConfig: ""      # Set in prod overrides
    mcpConfig: ""
    claudeSettings: ""
    env: ""

httproute:
  enabled: true
  hostname: ""  # Set in prod overrides
  gateway:
    name: homelab-gateway
    namespace: cilium-system
