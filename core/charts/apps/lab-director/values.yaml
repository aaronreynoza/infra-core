image:
  repository: harbor.aaron.reynoza.org/lab-director/backend
  tag: "ab2dec6"

replicas: 1
port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

env:
  OPERATOR_URL: ""  # Set in prod overrides
  TEMPORAL_HOST_PORT: ""  # Set in prod overrides
  TEMPORAL_NAMESPACE: "default"
  LITELLM_URL: "http://litellm.ai.svc.cluster.local:4000"
  PLANE_API_URL: ""  # Set in prod overrides
  PLANE_WORKSPACE_SLUG: ""  # Set in prod overrides
  PLANE_PROJECT_ID: ""  # Set in prod overrides
  OUTLINE_API_URL: ""  # Set in prod overrides
  FORGEJO_API_URL: ""  # Set in prod overrides

# Secret reference for LiteLLM API key (set in prod overrides)
litellmSecret:
  enabled: false
  secretName: ""
  secretKey: ""

# Secret reference for service API tokens (Plane, Outline, Forgejo)
serviceCredentials:
  enabled: false
  secretName: ""

database:
  secretName: cnpg-cluster-lab-director-app
  secretKey: uri

httproute:
  enabled: true
  hostname: ""  # Set in prod overrides
  gateway:
    name: homelab-gateway
    namespace: cilium-system

# Manager execution capability (HOMELAB-471)
execution:
  enabled: false  # Set true in prod overrides to activate
  pvcSize: "5Gi"
  workspaceDir: "/workspace"

# Claude OAuth credentials for Claude CLI (set in prod overrides)
claudeOauthSecret:
  enabled: false
  secretName: ""
  secretKey: ""

# SSH key for git operations (set in prod overrides)
sshSecret:
  enabled: false
  secretName: ""
  secretKey: ""
