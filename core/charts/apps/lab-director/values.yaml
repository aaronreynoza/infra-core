image:
  repository: harbor.aaron.reynoza.org/lab-director/backend
  tag: "2fd90c5"

replicas: 1
port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

env:
  OPERATOR_URL: ""  # Set in prod overrides
  TEMPORAL_HOST_PORT: ""  # Set in prod overrides
  TEMPORAL_NAMESPACE: "default"
  LITELLM_URL: "http://litellm.ai.svc.cluster.local:4000"

# Secret reference for LiteLLM API key (set in prod overrides)
litellmSecret:
  enabled: false
  secretName: ""
  secretKey: ""

database:
  secretName: cnpg-cluster-lab-director-app
  secretKey: uri

httproute:
  enabled: true
  hostname: ""  # Set in prod overrides
  gateway:
    name: homelab-gateway
    namespace: cilium-system

# Manager execution capability (HOMELAB-471)
execution:
  enabled: false  # Set true in prod overrides to activate
  pvcSize: "5Gi"
  workspaceDir: "/workspace"

# Anthropic API key for Claude CLI (set in prod overrides)
anthropicSecret:
  enabled: false
  secretName: ""
  secretKey: ""

# SSH key for git operations (set in prod overrides)
sshSecret:
  enabled: false
  secretName: ""
  secretKey: ""

# Claude OAuth credentials file (set in prod overrides)
claudeOauthSecret:
  enabled: false
  secretName: ""
  secretKey: ""

# Plane API key for ticket management (set in prod overrides)
planeSecret:
  enabled: false
  secretName: ""
  secretKey: ""
