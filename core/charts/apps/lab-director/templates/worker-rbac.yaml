{{- if .Values.worker.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lab-director.fullname" . }}-worker-cluster-reader
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dev-agent-scoped
subjects:
  - kind: ServiceAccount
    name: {{ .Values.worker.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lab-director.fullname" . }}-worker-namespace-admin
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.worker.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
