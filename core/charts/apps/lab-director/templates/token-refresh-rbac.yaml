{{- if .Values.tokenRefresh.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.tokenRefresh.serviceAccount }}
  namespace: {{ .Values.tokenRefresh.namespace }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: token-refresh
  namespace: {{ .Values.tokenRefresh.namespace }}
spec:
  rules:
    - apiGroups: [""]
      resources: ["secrets"]
      resourceNames: [{{ .Values.tokenRefresh.secretName | quote }}]
      verbs: ["get", "update", "patch"]
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: token-refresh
  namespace: {{ .Values.tokenRefresh.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: token-refresh
subjects:
  - kind: ServiceAccount
    name: {{ .Values.tokenRefresh.serviceAccount }}
    namespace: {{ .Values.tokenRefresh.namespace }}
{{- end }}
