apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lab-director.fullname" . }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "lab-director.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lab-director.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: lab-director
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            - name: OPERATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OPERATOR_URL
            {{- if .Values.env.TEMPORAL_HOST_PORT }}
            - name: TEMPORAL_HOST_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: TEMPORAL_HOST_PORT
            {{- end }}
            {{- if .Values.env.TEMPORAL_NAMESPACE }}
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: TEMPORAL_NAMESPACE
            {{- end }}
            {{- if .Values.env.LITELLM_URL }}
            - name: LITELLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: LITELLM_URL
            {{- end }}
            {{- if .Values.litellmSecret.enabled }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellmSecret.secretName }}
                  key: {{ .Values.litellmSecret.secretKey }}
            {{- end }}
            {{- if .Values.execution.enabled }}
            - name: MANAGER_EXECUTION_ENABLED
              value: "true"
            - name: WORKSPACE_DIR
              value: {{ .Values.execution.workspaceDir | default "/workspace" | quote }}
            {{- end }}
            {{- if .Values.anthropicSecret.enabled }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropicSecret.secretName }}
                  key: {{ .Values.anthropicSecret.secretKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.execution.enabled .Values.sshSecret.enabled }}
          volumeMounts:
            {{- if .Values.execution.enabled }}
            - name: workspace
              mountPath: {{ .Values.execution.workspaceDir | default "/workspace" }}
            {{- end }}
            {{- if .Values.sshSecret.enabled }}
            - name: ssh-key
              mountPath: /home/appuser/.ssh/id_ed25519
              subPath: {{ .Values.sshSecret.secretKey }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.execution.enabled .Values.sshSecret.enabled }}
      volumes:
        {{- if .Values.execution.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "lab-director.fullname" . }}-workspace
        {{- end }}
        {{- if .Values.sshSecret.enabled }}
        - name: ssh-key
          secret:
            secretName: {{ .Values.sshSecret.secretName }}
            defaultMode: 0400
        {{- end }}
      {{- end }}
