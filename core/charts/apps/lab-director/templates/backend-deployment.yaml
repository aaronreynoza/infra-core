apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lab-director.fullname" . }}-backend
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "lab-director.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "lab-director.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            - name: OPERATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OPERATOR_URL
            {{- if .Values.backend.env.TEMPORAL_HOST_PORT }}
            - name: TEMPORAL_HOST_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: TEMPORAL_HOST_PORT
            {{- end }}
            {{- if .Values.backend.env.TEMPORAL_NAMESPACE }}
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: TEMPORAL_NAMESPACE
            {{- end }}
            {{- if .Values.backend.env.LITELLM_URL }}
            - name: LITELLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: LITELLM_URL
            {{- end }}
            {{- if .Values.backend.litellmSecret.enabled }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.litellmSecret.secretName }}
                  key: {{ .Values.backend.litellmSecret.secretKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
