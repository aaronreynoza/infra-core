apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lab-director.fullname" . }}-backend
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "lab-director.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "lab-director.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- if .Values.backend.hostAliases }}
      hostAliases:
        {{- toYaml .Values.backend.hostAliases | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            - name: OPERATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OPERATOR_URL
            - name: OIDC_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OIDC_ISSUER
            - name: OIDC_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OIDC_REDIRECT_URL
            - name: OIDC_SCOPES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OIDC_SCOPES
            - name: OIDC_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lab-director.fullname" . }}
                  key: OIDC_COOKIE_SECURE
            {{- if .Values.backend.oidc.secretName }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.oidc.secretName }}
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.oidc.secretName }}
                  key: client-secret
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
