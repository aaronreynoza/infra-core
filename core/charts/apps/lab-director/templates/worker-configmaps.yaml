{{- if .Values.worker.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.worker.configmaps.gitConfig }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
data:
  .gitconfig: |
    [credential]
    	helper = store
    [user]
    	name = Claude Agent
    	email = agent@reynoza.org
    [init]
    	defaultBranch = main
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.worker.configmaps.claudeSettings }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
data:
  settings.json: |
    {}
  settings.local.json: |
    {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.worker.configmaps.env }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
data:
  GIT_AUTHOR_EMAIL: agent@reynoza.org
  GIT_AUTHOR_NAME: Claude Agent
  GIT_EDITOR: "true"
  LANGFUSE_HOST: https://langfuse.aaron.reynoza.org
  SOPS_AGE_KEY_FILE: /home/claude-agent/.config/sops/age/keys.txt
  TRACE_TO_LANGFUSE: "true"
{{- end }}
