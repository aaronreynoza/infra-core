apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lab-director.fullname" . }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
data:
  OPERATOR_URL: {{ .Values.env.OPERATOR_URL | quote }}
  {{- if .Values.env.TEMPORAL_HOST_PORT }}
  TEMPORAL_HOST_PORT: {{ .Values.env.TEMPORAL_HOST_PORT | quote }}
  {{- end }}
  {{- if .Values.env.TEMPORAL_NAMESPACE }}
  TEMPORAL_NAMESPACE: {{ .Values.env.TEMPORAL_NAMESPACE | quote }}
  {{- end }}
  {{- if .Values.env.LITELLM_URL }}
  LITELLM_URL: {{ .Values.env.LITELLM_URL | quote }}
  {{- end }}
  {{- if .Values.env.PLANE_API_URL }}
  PLANE_API_URL: {{ .Values.env.PLANE_API_URL | quote }}
  {{- end }}
  {{- if .Values.env.PLANE_WORKSPACE_SLUG }}
  PLANE_WORKSPACE_SLUG: {{ .Values.env.PLANE_WORKSPACE_SLUG | quote }}
  {{- end }}
  {{- if .Values.env.PLANE_PROJECT_ID }}
  PLANE_PROJECT_ID: {{ .Values.env.PLANE_PROJECT_ID | quote }}
  {{- end }}
  {{- if .Values.env.OUTLINE_API_URL }}
  OUTLINE_API_URL: {{ .Values.env.OUTLINE_API_URL | quote }}
  {{- end }}
  {{- if .Values.env.FORGEJO_API_URL }}
  FORGEJO_API_URL: {{ .Values.env.FORGEJO_API_URL | quote }}
  {{- end }}
