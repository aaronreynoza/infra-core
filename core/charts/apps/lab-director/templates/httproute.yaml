{{- if and .Values.httproute.enabled .Values.httproute.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lab-director.fullname" . }}
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.gateway.name }}
      namespace: {{ .Values.httproute.gateway.namespace }}
  hostnames:
    - {{ .Values.httproute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /ws
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: {{ include "lab-director.fullname" . }}-backend
          port: {{ .Values.backend.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "lab-director.fullname" . }}-frontend
          port: {{ .Values.frontend.port }}
{{- end }}
