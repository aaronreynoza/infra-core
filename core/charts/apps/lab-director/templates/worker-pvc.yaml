{{- if .Values.worker.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lab-director.fullname" . }}-worker-workspace
  labels:
    {{- include "lab-director.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.worker.workspace.storageClass }}
  resources:
    requests:
      storage: {{ .Values.worker.workspace.storageSize }}
{{- end }}
