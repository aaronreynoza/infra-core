# Harbor Helm Values — Generic Configuration
# Container registry — internal-only deployment (HTTP, no TLS)
# See: https://github.com/goharbor/harbor-helm
#
# Environment-specific overrides (externalURL, existingSecretAdminPassword)
# are in the prod repo: values/harbor/values.yaml

# Expose via LoadBalancer (Cilium LB-IPAM assigns IP)
expose:
  type: loadBalancer
  tls:
    enabled: false
  loadBalancer:
    name: harbor
    annotations: {}

# Admin password key name (secret reference is env-specific)
existingSecretAdminPasswordKey: admin-password

# Persistence using Longhorn (single replica)
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      storageClass: longhorn
      size: 50Gi
    database:
      storageClass: longhorn
      size: 5Gi
    redis:
      storageClass: longhorn
      size: 1Gi
    trivy:
      storageClass: longhorn
      size: 5Gi

# Database — internal PostgreSQL
database:
  type: internal
  internal:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Redis — internal Redis
redis:
  type: internal
  internal:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

# Trivy — vulnerability scanning
trivy:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Core service
core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Portal (web UI)
portal:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Job service
jobservice:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Registry
registry:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
