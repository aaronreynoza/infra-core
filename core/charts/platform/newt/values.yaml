# Newt (Pangolin tunnel agent) Helm values
# Chart: fossorial/newt
# Docs: https://github.com/fosrl/pangolin
#
# Credentials are managed via SOPS-encrypted secrets in the prod repo.
# Terraform creates the K8s secret, ArgoCD references it via existingSecretName.
# The secret name and key mappings are set in prod/values/newt/values.yaml.

newtInstances:
  - name: "main-tunnel"
    enabled: true
    replicas: 1

    # Userspace WireGuard (no privileged mode needed)
    useNativeInterface: false

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

    service:
      enabled: false
