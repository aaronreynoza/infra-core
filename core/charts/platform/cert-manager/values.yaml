# cert-manager — automated TLS certificate management
# Chart: jetstack/cert-manager
installCRDs: true
replicaCount: 1
# Use external DNS for ACME challenge propagation checks
# Required because our split-horizon CoreDNS intercepts *.aaron.reynoza.org
# and returns SERVFAIL for SOA queries on _acme-challenge subdomain
extraArgs:
  - --dns01-recursive-nameservers=1.1.1.1:53,8.8.8.8:53
  - --dns01-recursive-nameservers-only=true
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
webhook:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
cainjector:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
