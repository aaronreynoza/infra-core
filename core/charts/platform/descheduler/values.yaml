# Descheduler Configuration (HOMELAB-284)
# Actively rebalances pods across nodes by evicting from overloaded nodes.
# The default scheduler then places evicted pods on the least-loaded node.
#
# Safety:
# - Respects PDBs (never evicts if it would violate PDB)
# - Never evicts DaemonSet pods
# - Never evicts pods with system-cluster-critical or system-node-critical priority
# - ignorePvcPods: true — won't evict pods with PVCs (stateful workloads safe)
# - evictLocalStoragePods: false — won't evict pods using emptyDir

kind: Deployment
schedule: "*/5 * * * *"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

deschedulerPolicyAPIVersion: "descheduler/v1alpha2"

deschedulerPolicy:
  profiles:
    - name: default
      pluginConfig:
        - name: DefaultEvictor
          args:
            ignorePvcPods: true
            evictLocalStoragePods: false
        - name: LowNodeUtilization
          args:
            thresholds:
              cpu: 20
              memory: 20
              pods: 20
            targetThresholds:
              cpu: 50
              memory: 50
              pods: 50
        - name: RemoveDuplicates
      plugins:
        balance:
          enabled:
            - LowNodeUtilization
            - RemoveDuplicates
