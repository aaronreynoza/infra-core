# opentelemetry-collector - base values
# Source chart: open-telemetry/opentelemetry-collector
# All values are generic; no env-specific overrides needed.

# Deployment mode (not daemonset) for homelab
mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Ports exposed by the collector
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

# Service — NodePort to allow VM 110 agent to send spans
service:
  type: NodePort

# Collector configuration
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100
    # Filter: drop non-agent spans before sending to Langfuse
    # OTTL syntax (OTel Collector Contrib 0.111.0+)
    filter/langfuse:
      error_mode: ignore
      traces:
        span:
          - 'resource.attributes["service.name"] != "agent-harness"'

  exporters:
    # Metrics -> Mimir (via Prometheus remote-write)
    prometheusremotewrite:
      endpoint: http://mimir.monitoring.svc.cluster.local:9009/api/v1/push
      tls:
        insecure: true
    # Traces -> Tempo (via OTLP gRPC)
    otlp/tempo:
      endpoint: http://tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    # Logs -> Loki (via OTLP HTTP)
    otlphttp/loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    # Traces -> Langfuse (agent-harness spans only, via OTLP HTTP)
    otlphttp/langfuse:
      endpoint: "${env:LANGFUSE_OTLP_ENDPOINT}"
      headers:
        x-langfuse-ingestion-version: "4"
        Authorization: "Basic ${env:LANGFUSE_BASIC_AUTH}"
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      sending_queue:
        enabled: true
        num_consumers: 2
        queue_size: 100

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      # Agent traces -> Langfuse (filtered)
      traces/langfuse:
        receivers: [otlp]
        processors: [memory_limiter, filter/langfuse, batch]
        exporters: [otlphttp/langfuse]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki]
