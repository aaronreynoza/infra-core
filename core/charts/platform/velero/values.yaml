# Velero Helm Values — Reference Configuration
# Backup and disaster recovery for Kubernetes
# Chart: vmware-tanzu/velero v11.4.0 (appVersion: v1.17.1)
# Docs: https://github.com/vmware-tanzu/helm-charts/tree/main/charts/velero
#
# Secrets managed via SOPS — see docs/configuration.md
# Required K8s secret: velero-aws-credentials
#   Key: cloud (contains AWS credentials file format)
# Created by Terraform from environments/<env>/secrets/
#
# Environment-specific overrides (bucket, region, existingSecret) live in
# the prod repo under values/velero/values.yaml.

# AWS plugin init container — required for S3 backup storage
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# Velero server configuration
configuration:
  # BackupStorageLocation — where backup tarballs are stored
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: "my-velero-backups"
      default: true
      accessMode: ReadWrite
      config:
        region: us-east-1

  # VolumeSnapshotLocation — for EBS-style snapshots (not used on-prem,
  # but needed so Velero doesn't error; file-system backup via node-agent
  # handles PV data instead)
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

# AWS credentials — set existingSecret in your environment override
credentials:
  useSecret: true

# Velero server resources (homelab-appropriate)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Node-agent disabled — PV backups handled by CNPG (databases) and
# Longhorn (local snapshots). Velero only backs up K8s resources.
deployNodeAgent: false

# Scheduled backups — K8s resources only (manifests, secrets, CRDs)
schedules:
  daily-backup:
    disabled: false
    schedule: "0 2 * * *"  # 2:00 AM UTC daily
    template:
      ttl: "720h"  # 30-day retention
      storageLocation: default
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - kube-system
        - velero
      defaultVolumesToFsBackup: false

# Disable snapshot CRD since we use file-system backups, not EBS snapshots
snapshotsEnabled: false

# Upgrade job resources
upgradeJobResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
