# External Secrets Operator — syncs secrets from source stores into K8s
# Chart: external-secrets/external-secrets

# Controller
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Webhook
webhook:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Cert controller
certController:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# CRDs managed by Helm
installCRDs: true

# Metrics for Prometheus
serviceMonitor:
  enabled: true
  namespace: monitoring
