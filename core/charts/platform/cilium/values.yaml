# Cilium CNI Configuration for Talos Linux
# Talos disables kube-proxy, so Cilium must handle service proxying.

ipam:
  mode: kubernetes

# kube-proxy replacement — requires k8sServiceHost/Port
kubeProxyReplacement: true
# k8sServiceHost and k8sServicePort must be set per-environment.
# Cilium IS the DNS provider, so this MUST be an IP address (not a hostname).
# Set these in your environment-specific values override.

# BPF masquerade (required when replacing kube-proxy)
bpf:
  masquerade: true

# BPF load balancer acceleration (XDP for LB traffic)
loadBalancer:
  acceleration: native

# EDT-based bandwidth pacing
bandwidthManager:
  enabled: true

# MTU — native routing on VLAN has no tunnel overhead
# VLAN 802.1Q tag is handled at L2 by switch/NIC, not IP layer
mtu: 1500

# Routing — native mode for flat L2 VLAN network (avoids double encapsulation)
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.244.0.0/16"

# Security context for Talos Linux
# Talos restricts capability application for non-privileged containers,
# so privileged mode is required for Cilium agent and init containers.
securityContext:
  privileged: true

# Cilium agent resources (HOMELAB-284)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 250m
        memory: 256Mi
  ui:
    enabled: true
    backend:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi
    frontend:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi

# Talos already mounts cgroupv2 — do not let Cilium try to mount it
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# L2 announcements — makes LoadBalancer IPs reachable on the local network
l2announcements:
  enabled: true

# External IPs / LB-IPAM — Cilium assigns IPs from a pool to LoadBalancer services
externalIPs:
  enabled: true

# Gateway API — single ingress gateway replaces per-service LoadBalancer IPs
gatewayAPI:
  enabled: true
  enableAlpn: true  # Required for gRPC (h2) through TLS-terminated gateway

# Single-node operator (resource constrained)
operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
