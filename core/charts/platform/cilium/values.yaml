# Cilium CNI Configuration for Talos Linux
# Talos disables kube-proxy, so Cilium must handle service proxying.

ipam:
  mode: kubernetes

# kube-proxy replacement — requires k8sServiceHost/Port
kubeProxyReplacement: true
k8sServiceHost: "REDACTED_K8S_API"
k8sServicePort: "6443"

# BPF masquerade (required when replacing kube-proxy)
bpf:
  masquerade: true

# MTU — native routing on VLAN has no tunnel overhead
# VLAN 802.1Q tag is handled at L2 by switch/NIC, not IP layer
mtu: 1500

# Routing — native mode for flat L2 VLAN network (avoids double encapsulation)
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.244.0.0/16"

# Security context for Talos Linux
# Talos restricts capability application for non-privileged containers,
# so privileged mode is required for Cilium agent and init containers.
securityContext:
  privileged: true

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Talos already mounts cgroupv2 — do not let Cilium try to mount it
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# L2 announcements — makes LoadBalancer IPs reachable on the local network
l2announcements:
  enabled: true

# External IPs / LB-IPAM — Cilium assigns IPs from a pool to LoadBalancer services
externalIPs:
  enabled: true

# Single-node operator (resource constrained)
operator:
  replicas: 1
