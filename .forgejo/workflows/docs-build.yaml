name: Build & Deploy Docs

on:
  push:
    branches: [live]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'Dockerfile.docs'
      - 'Caddyfile'

jobs:
  build-and-push:
    runs-on: infra
    steps:
      - uses: actions/checkout@v4

      - name: Set image variables
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY="harbor.aaron.reynoza.org"
          IMAGE="${REGISTRY}/platform/docs"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile.docs \
            -t "${{ env.IMAGE }}:${{ env.SHORT_SHA }}" \
            -t "${{ env.IMAGE }}:latest" \
            .

      - name: Push to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.aaron.reynoza.org \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
          docker push "${{ env.IMAGE }}:${{ env.SHORT_SHA }}"
          docker push "${{ env.IMAGE }}:latest"
          docker logout harbor.aaron.reynoza.org

      - name: Update deployment manifest
        run: |
          sed -i "s|image: .*platform/docs:.*|image: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}|" \
            core/manifests/apps/docs-site/deployment.yaml

      - name: Commit and push updated image tag
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"
          git add core/manifests/apps/docs-site/deployment.yaml
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update docs image to ${{ env.SHORT_SHA }} [skip ci]"
            git push
          fi
