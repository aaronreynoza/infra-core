# worker-talos.yaml (snippet)
machine:
  # Needed by Longhorn on Talos
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools       # Longhorn requirement
          - siderolabs/util-linux-tools  # Longhorn requirement

  kubelet:
    extraMounts:
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw

# Claim /dev/vdb for Longhorn and mount it at /var/mnt/longhorn
# (Talos will create/format and mount during boot)
user:
  # (user config block if you use talhelper, else see "cluster" block in raw machine config)
cluster: {}  # keep your normal cluster bits here

# If you use talhelper, it looks like this under the worker stanza:
# worker:
#   userVolumes:
#     - name: longhorn
#       provisioning:
#         diskSelector:
#           match: disk.dev_path == '/dev/vdb' && !system_disk
#         minSize: "900GiB"    # adjust as you like
#         grow: true
