name: Terraform Proxmox (Talos)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform-proxmox.yml"

jobs:
  apply:
    runs-on: [self-hosted, linux, x64, proxmox]

    env:
      # Terraform picks these up automatically as input variables:
      TF_VAR_proxmox_api_url:          ${{ secrets.PROXMOX_API_URL }}          # e.g. https://pve:8006/api2/json
      TF_VAR_proxmox_api_token_id:     ${{ secrets.PROXMOX_API_TOKEN_ID }}     # e.g. packer@pve!packer
      TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }} # token value
      # Compose pm_ssh_host = "<user>@<host>"
      SSH_USER:                         ${{ secrets.PROXMOX_SSH_USER }}        # e.g. root
      SSH_HOST:                         ${{ secrets.PROXMOX_SSH_HOST }}        # e.g. pve or 10.0.0.10
      TF_VAR_pm_ssh_host:              ${{ secrets.PROXMOX_SSH_USER }}@${{ secrets.PROXMOX_SSH_HOST }}

      # Non-sensitive defaults you can also override as secrets if you want
      TF_VAR_pm_node:    pve
      TF_VAR_vm_storage: local-lvm
      TF_VAR_bridge:     vmbr0

      # Provide your Talos image URL via secret to avoid committing it (optional)
      TF_VAR_talos_image_url: ${{ secrets.TALOS_IMAGE_URL }}

      # Optional: quieter Terraform output in logs
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}

      - name: Add Proxmox host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Sanity check SSH connectivity (no secrets echoed)
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" "pveversion | head -1"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Optional plan (will still hide sensitive var values)
      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        # auto-approve since this is infra automation; remove if you want manual approval
        run: terraform apply -input=false -auto-approve
