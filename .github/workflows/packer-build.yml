name: packer-build

on:
  workflow_dispatch:
  push:
    paths:
      - 'packer/**'

jobs:
  build-talos-template:
    runs-on: [self-hosted, proxmox]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v2

      - name: Build Talos template on Proxmox
        working-directory: packer
        env:
          PACKER_LOG: "1"
        run: |
          packer init .
          packer build \
            -var "proxmox_url=${{ secrets.PROXMOX_URL }}" \
            -var "proxmox_token_id=${{ secrets.PROXMOX_TOKEN_ID }}" \
            -var "proxmox_token_secret=${{ secrets.PROXMOX_TOKEN_SECRET }}" \
            -var "proxmox_node=${{ secrets.PROXMOX_NODE }}" \
            -var "storage_pool=${{ secrets.PROXMOX_STORAGE || 'local-lvm' }}" \
            -var "network_bridge=${{ secrets.PROXMOX_BRIDGE || 'vmbr0' }}" \
            -var "template_name=template-talos" \
            -var "talos_version=${{ vars.TALOS_VERSION || 'v1.7.4' }}" \
            -var "talos_image_url=${{ vars.TALOS_IMAGE_URL || 'https://github.com/siderolabs/talos/releases/download/v1.7.4/nocloud-amd64.img.xz' }}" \
            talos-template.pkr.hcl
