name: build-talos-template
on:
  workflow_dispatch:

jobs:
  packer:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v2
        with:
          version: latest

      - name: Packer init
        run: packer init packer/talos-packer

      - name: Packer build (token auth via GitHub Secrets)
        env:
          PACKER_LOG: "1"
        run: |
          packer build \
            -var "proxmox_api_url=${{ secrets.PROXMOX_API_URL }}" \
            -var "proxmox_api_token_id=${{ secrets.PROXMOX_API_TOKEN_ID }}" \
            -var "proxmox_api_token_secret=${{ secrets.PROXMOX_API_TOKEN_SECRET }}" \
            -var "proxmox_node=${{ vars.PROXMOX_NODE }}" \
            -var "proxmox_storage=${{ vars.PROXMOX_STORAGE }}" \
            -var "cloudinit_storage_pool=${{ vars.PROXMOX_CI_STORAGE || vars.PROXMOX_STORAGE }}" \
            -var "vm_id=${{ vars.PROXMOX_VM_ID }}" \
            -var "cpu_type=${{ vars.PROXMOX_CPU_TYPE || 'kvm64' }}" \
            -var "cores=${{ vars.PROXMOX_CORES || '2' }}" \
            -var "talos_version=${{ vars.TALOS_VERSION || 'v1.10.4' }}" \
            -var "base_iso_file=${{ vars.PROXMOX_BASE_ISO_FILE }}" \
            packer/talos-packer/proxmox.pkr.hcl
