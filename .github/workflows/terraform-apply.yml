name: Terraform Proxmox (Talos)

on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - "scripts/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: [self-hosted, linux, x64, proxmox]

    env:
      PROXMOX_VE_ENDPOINT:  "https://${{ vars.PROXMOX_API_URL }}/api2/json"
      PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_TOKEN_SECRET }}
      PROXMOX_VE_INSECURE:  "true"

      PROXMOX_TOKEN_ID:     ${{ secrets.PROXMOX_TOKEN_ID }}
      PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}

      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools & make scripts executable
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          if ! command -v xz >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y xz-utils
          fi
          chmod +x scripts/*.sh

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}

      - name: Write known_hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROXMOX_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Check if Talos RAW image exists in Proxmox
        id: check_image
        run: scripts/check-image.sh

      - name: Upload Talos RAW image if missing
        if: steps.check_image.outputs.image_present != 'true'
        run: scripts/upload-image.sh

      - name: Configure AWS credentials (S3 backend)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init (S3 backend)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ vars.TF_BACKEND_PREFIX }}/infra.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
