name: Terraform Proxmox (Talos)

on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: [self-hosted, linux, x64, proxmox]

    env:
      # bpg/proxmox provider picks these up automatically
      PROXMOX_VE_ENDPOINT:   ${{ vars.PROXMOX_API_URL }}/api2/json
      PROXMOX_VE_API_TOKEN:  ${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_TOKEN_SECRET }}
      PROXMOX_VE_INSECURE:   "true"

      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (S3 backend)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init (S3 backend)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ vars.TF_BACKEND_PREFIX }}/infra.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
